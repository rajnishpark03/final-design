<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 132" fill="none">
  <!-- forearm (behind everything) -->
  <path d="M58 102 L114 128" stroke="#E7A989" stroke-width="22" stroke-linecap="round"/>

  <!-- device + hand, tilted -->
  <g transform="rotate(-16 58 64)">
    <!-- phone body -->
    <rect x="30" y="14" width="56" height="100" rx="12" fill="#2A1E63"/>
    <rect x="30" y="14" width="56" height="100" rx="12" fill="#000" opacity="0.12"/>

    <!-- screen quadrants (2px gaps show the navy body) -->
    <rect x="35" y="22" width="22.5" height="40" rx="2.5" fill="#D63B3B"/>
    <rect x="60.5" y="22" width="22.5" height="40" rx="2.5" fill="#2F6FD4"/>
    <rect x="35" y="64.5" width="22.5" height="40" rx="2.5" fill="#F2A52E"/>
    <rect x="60.5" y="64.5" width="22.5" height="40" rx="2.5" fill="#3FA53C"/>

    <!-- white shapes -->
    <path d="M41 35 L41 49 L53 42 Z" fill="#fff"/>
    <path d="M71.5 35 L78.5 42 L71.5 49 L64.5 42 Z" fill="#fff"/>
    <circle cx="46" cy="84.5" r="6.2" fill="#fff"/>
    <rect x="65.5" y="78" width="12" height="12" rx="1.5" fill="#fff"/>

    <!-- home indicator -->
    <circle cx="58" cy="109" r="2.6" fill="#9A8CD0"/>

    <!-- fingers gripping the left edge -->
    <g fill="#E7A989">
      <rect x="22" y="42" width="20" height="9.5" rx="4.75"/>
      <rect x="20" y="55" width="22" height="9.5" rx="4.75"/>
      <rect x="20" y="68" width="22" height="9.5" rx="4.75"/>
      <rect x="22" y="81" width="20" height="9.5" rx="4.75"/>
    </g>
    <!-- subtle finger shading -->
    <g fill="#D6936F" opacity="0.55">
      <rect x="22" y="50" width="20" height="2" rx="1"/>
      <rect x="20" y="63" width="22" height="2" rx="1"/>
      <rect x="20" y="76" width="22" height="2" rx="1"/>
    </g>
  </g>
</svg>
